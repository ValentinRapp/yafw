name: Release YAFW

on:
  push:
    tags:
      - 'v*'
    branches:
      - dev

permissions:
  contents: write

jobs:
  create-release:
    name: Ensure Release Exists
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Create or Update GitHub Release Header
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ startsWith(github.ref, 'refs/tags/v') && github.ref_name || 'canary' }}
          name: ${{ startsWith(github.ref, 'refs/tags/v') && github.ref_name || 'Canary Build' }}
          draft: false
          prerelease: ${{ !startsWith(github.ref, 'refs/tags/v') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-and-upload:
    name: Build & Upload on ${{ matrix.os }}
    needs: create-release
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install Dependencies
        run: bun install

      - name: Build Application
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            bun run build:stable
          else
            bun run build:canary
          fi
        shell: bash

      - name: Upload Release Artifacts
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ startsWith(github.ref, 'refs/tags/v') && github.ref_name || 'canary' }}
          files: artifacts/*
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Calculate sha256
        if: matrix.os == 'macos-latest' && startsWith(github.ref, 'refs/tags/v')
        id: sha
        run: |
          echo "hash=$(shasum -a 256 artifacts/stable-macos-arm64-yafw.dmg | awk '{print $1}')" >> $GITHUB_OUTPUT

      - name: Update Homebrew Tap (Cask)
        if: matrix.os == 'macos-latest' && startsWith(github.ref, 'refs/tags/v')
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          script: |
            const version = context.ref.replace('refs/tags/v', '');
            const hash = '${{ steps.sha.outputs.hash }}';
            const owner = context.repo.owner;
            const repo = 'homebrew-yafw';
            const caskPath = 'Casks/yafw.rb';

            const caskContent = `cask "yafw" do
              version "${version}"
              sha256 "${hash}"

              url "https://github.com/${owner}/yafw/releases/download/v#{version}/stable-macos-arm64-yafw.dmg"
              name "Yafw"
              desc "Yet Another FFmpeg Wrapper"
              homepage "https://github.com/${owner}/yafw"

              depends_on arch: :arm64
              depends_on formula: "ffmpeg"

              app "yafw.app"

              postflight do
                system_command "xattr",
                               args: ["-cr", "#{appdir}/yafw.app"],
                               sudo: false
              end

              zap trash: [
                "~/Library/Application Support/yafw",
                "~/Library/Preferences/yafw.electrobun.dev.plist",
              ]
            end\n`;

            let sha;
            try {
              const { data: file } = await github.rest.repos.getContent({
                owner,
                repo,
                path: caskPath
              });
              sha = file.sha;
            } catch (err) {
              if (err.status !== 404) throw err;
              console.log('Cask file does not exist yet and will be created.');
            }

            await github.rest.repos.createOrUpdateFileContents({
              owner,
              repo,
              path: caskPath,
              message: `chore: update yafw cask to v${version}`,
              content: Buffer.from(caskContent).toString('base64'),
              sha
            });
